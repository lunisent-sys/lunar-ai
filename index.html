<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar AI - Your Intelligent Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="auth-card" style="max-width: 600px; text-align: center;">
            <div class="auth-header">
                <h1>🌙 Lunar AI</h1>
                <p>Your Intelligent Assistant Powered by Groq AI</p>
            </div>
            
            <div style="margin: 40px 0;">
                <p style="color: var(--text-secondary); margin-bottom: 20px;">
                    Experience the future of AI conversation with Lunar AI. 
                    Smart, fast, and always learning from your interactions.
                </p>
                
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <a href="login.html" class="btn btn-primary" style="text-decoration: none; width: auto; padding: 12px 30px;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                    <a href="register.html" class="btn btn-secondary" style="text-decoration: none; width: auto; padding: 12px 30px;">
                        <i class="fas fa-user-plus"></i> Register
                    </a>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 40px;">
                <div>
                    <i class="fas fa-comment-dots" style="font-size: 2rem; color: var(--primary);"></i>
                    <h4>Smart Chat</h4>
                </div>
                <div>
                    <i class="fas fa-image" style="font-size: 2rem; color: var(--primary);"></i>
                    <h4>File Upload</h4>
                </div>
                <div>
                    <i class="fas fa-brain" style="font-size: 2rem; color: var(--primary);"></i>
                    <h4>Remembers You</h4>
                </div>
                <div>
                    <i class="fas fa-moon" style="font-size: 2rem; color: var(--primary);"></i>
                    <h4>Glass UI</h4>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
